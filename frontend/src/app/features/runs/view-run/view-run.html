<section class="w-full min-h-screen bg-zinc-950">
  <div>
    <app-navbar />
  </div>

  @if (run) {
    <div class="pt-24 px-6 max-w-2xl mx-auto">
      <!-- Header -->
      <div class="text-center mb-10">
        <p class="text-zinc-500 text-sm mb-2 mt-20">{{ run.createdAt | date: 'EEEE, MMMM d, y' }}</p>
        <h1 class="text-3xl font-bold text-white mb-1">Run Complete</h1>
      </div>

      <!-- Distance -->
      <div class="bg-linear-to-br from-lime-800 to-emerald-950 rounded-2xl p-8 text-center mb-6">
        <p class="text-emerald-200 text-sm uppercase tracking-wider mb-2">Distance</p>
        <p class="text-white text-6xl font-bold">{{ run.distance }}</p>
        <p class="text-emerald-200 text-xl">kilometers</p>
      </div>

      <!-- Stats -->
      <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-5">
          <div class="flex items-center gap-3 mb-2">
            <div class="w-10 h-10 bg-blue-500/20 rounded-lg flex items-center justify-center">
              <svg class="w-5 h-5 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10" />
                <polyline points="12 6 12 12 16 14" />
              </svg>
            </div>
            <p class="text-zinc-500 text-sm">Duration</p>
          </div>
          <p class="text-white text-2xl font-bold">{{ formatDuration(run.duration) }}</p>
        </div>

        <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-5">
          <div class="flex items-center gap-3 mb-2">
            <div class="w-10 h-10 bg-amber-500/20 rounded-lg flex items-center justify-center">
              <svg class="w-5 h-5 text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M13 10V3L4 14h7v7l9-11h-7z" />
              </svg>
            </div>
            <p class="text-zinc-500 text-sm">Pace</p>
          </div>
          <p class="text-white text-2xl font-bold">{{ formatPace(run.pace) }}<span class="text-zinc-500 text-base font-normal">/km</span></p>
        </div>

        <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-5">
          <div class="flex items-center gap-3 mb-2">
            <div class="w-10 h-10 bg-red-500/20 rounded-lg flex items-center justify-center">
              <svg class="w-5 h-5 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M12 2C8 6 4 10 4 14a8 8 0 1 0 16 0c0-4-4-8-8-12z" />
              </svg>
            </div>
            <p class="text-zinc-500 text-sm">Calories</p>
          </div>
          <p class="text-white text-2xl font-bold">{{ run.calories }}<span class="text-zinc-500 text-base font-normal"> kcal</span></p>
        </div>

        <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-5">
          <div class="flex items-center gap-3 mb-2">
            <div class="w-10 h-10 bg-purple-500/20 rounded-lg flex items-center justify-center">
              <svg class="w-5 h-5 text-purple-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M8 6l4-4 4 4M8 18l4 4 4-4M4 12h16" />
              </svg>
            </div>
            <p class="text-zinc-500 text-sm">Elevation</p>
          </div>
          <p class="text-white text-2xl font-bold">{{ run.elevation }}<span class="text-zinc-500 text-base font-normal"> m</span></p>
        </div>
      </div>

      <button
        routerLink="/runs/all"
        class="w-full bg-zinc-800 hover:bg-zinc-700 text-white font-semibold hover:cursor-pointer py-4 rounded-xl transition-colors"
      >
        Back to All Runs
      </button>
    </div>
  } @else {
    <div class="pt-24 px-6 flex justify-center">
      <p class="text-zinc-400">Loading...</p>
    </div>
  }
</section>
