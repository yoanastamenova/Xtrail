<div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 max-w-md mx-4">
    <h2 class="text-xl font-bold text-white mb-2">{{ title }}</h2>
    <p class="text-zinc-400 mb-6">{{ message }}</p>

    <div class="flex gap-3">
      <button
        (click)="onCancel()"
        class="flex-1 px-4 py-2 border border-zinc-700 text-zinc-300 rounded-lg hover:bg-zinc-800 transition-colors"
      >
        {{ cancelText }}
      </button>
      <button
        (click)="onConfirm()"
        class="flex-1 px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition-colors"
      >
        {{ confirmText }}
      </button>
    </div>
  </div>
</div>
